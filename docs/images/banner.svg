<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" width="100%">
  <defs>
    <!-- Dark gradient background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#09090b" />
      <stop offset="100%" stop-color="#18181b" />
    </linearGradient>
    
    <!-- Accent glow for the Shell part -->
    <filter id="textGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Logo glow -->
    <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Container -->
  <rect width="800" height="320" rx="32" fill="url(#bg)" stroke="#27272a" stroke-width="2"/>

  <!-- Original Mascot with Glow -->
  <g transform="translate(350, 50)" filter="url(#glow)">
    <!-- Legs/Antennae from first version -->
    <line x1="25" y1="45" x2="5" y2="40" stroke="white" stroke-width="4" stroke-linecap="round" />
    <line x1="23" y1="55" x2="5" y2="55" stroke="white" stroke-width="4" stroke-linecap="round" />
    <line x1="28" y1="65" x2="10" y2="75" stroke="white" stroke-width="4" stroke-linecap="round" />
    <line x1="75" y1="45" x2="95" y2="40" stroke="white" stroke-width="4" stroke-linecap="round" />
    <line x1="77" y1="55" x2="95" y2="55" stroke="white" stroke-width="4" stroke-linecap="round" />
    <line x1="72" y1="65" x2="90" y2="75" stroke="white" stroke-width="4" stroke-linecap="round" />
    
    <!-- Main Face Circle -->
    <circle cx="50" cy="55" r="30" fill="white" />
    
    <!-- Eyes -->
    <circle cx="42" cy="50" r="5" fill="black" />
    <circle cx="58" cy="50" r="5" fill="black" />
  </g>

  <!-- Typography with Semantic Separation -->
  <g transform="translate(400, 225)">
    <!-- Separated colors to prevent "Hermits Hell" reading -->
    <text text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="900" letter-spacing="2">
      <tspan fill="#ffffff">HERMIT</tspan><tspan fill="#3b82f6" filter="url(#textGlow)">SHELL</tspan>
    </text>
    
    <!-- Tagline -->
    <text y="40" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="#a1a1aa" letter-spacing="6">AI AGENT OS</text>
  </g>
</svg>