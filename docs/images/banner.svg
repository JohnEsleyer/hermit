<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="100%">
  <defs>
    <!-- Sharp black background -->
    <rect id="bg-rect" width="800" height="160" fill="#000000"/>
    
    <!-- Red Glow -->
    <filter id="redGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feFlood flood-color="#ef4444" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over" />
    </filter>

    <!-- White Glow -->
    <filter id="whiteGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feFlood flood-color="#ffffff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over" />
    </filter>

    <!-- Green Glow -->
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feFlood flood-color="#22c55e" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feComposite in="SourceGraphic" in2="glow" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <use href="#bg-rect" />

  <!-- SQUAD CONTAINER -->
  <g transform="translate(400, 55)">
    
    <!-- Left Mascot (Red - Rotated) -->
    <g transform="translate(-45, 5) scale(0.45) rotate(-15, 50, 50)" filter="url(#redGlow)">
      <g stroke="#ef4444" stroke-width="4" stroke-linecap="round">
        <line x1="25" y1="45" x2="5" y2="40" />
        <line x1="23" y1="55" x2="5" y2="55" />
        <line x1="28" y1="65" x2="10" y2="75" />
        <line x1="75" y1="45" x2="95" y2="40" />
        <line x1="77" y1="55" x2="95" y2="55" />
        <line x1="72" y1="65" x2="90" y2="75" />
      </g>
      <circle cx="50" cy="55" r="30" fill="#ef4444" />
      <circle cx="42" cy="50" r="5" fill="black" />
      <circle cx="58" cy="50" r="5" fill="black" />
    </g>

    <!-- Right Mascot (Green - Rotated) -->
    <g transform="translate(45, 5) scale(0.45) rotate(15, 50, 50)" filter="url(#greenGlow)">
      <g stroke="#22c55e" stroke-width="4" stroke-linecap="round">
        <line x1="25" y1="45" x2="5" y2="40" />
        <line x1="23" y1="55" x2="5" y2="55" />
        <line x1="28" y1="65" x2="10" y2="75" />
        <line x1="75" y1="45" x2="95" y2="40" />
        <line x1="77" y1="55" x2="95" y2="55" />
        <line x1="72" y1="65" x2="90" y2="75" />
      </g>
      <circle cx="50" cy="55" r="30" fill="#22c55e" />
      <circle cx="42" cy="50" r="5" fill="black" />
      <circle cx="58" cy="50" r="5" fill="black" />
    </g>

    <!-- Center Forward Mascot (White) -->
    <g transform="translate(-25, -15) scale(0.55)" filter="url(#whiteGlow)">
      <g stroke="white" stroke-width="4" stroke-linecap="round">
        <line x1="25" y1="45" x2="5" y2="40" />
        <line x1="23" y1="55" x2="5" y2="55" />
        <line x1="28" y1="65" x2="10" y2="75" />
        <line x1="75" y1="45" x2="95" y2="40" />
        <line x1="77" y1="55" x2="95" y2="55" />
        <line x1="72" y1="65" x2="90" y2="75" />
      </g>
      <circle cx="50" cy="55" r="30" fill="white" />
      <circle cx="42" cy="50" r="5" fill="black" />
      <circle cx="58" cy="50" r="5" fill="black" />
    </g>
  </g>

  <!-- Creative B&W Typography -->
  <g transform="translate(400, 125)">
    <text text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="900" letter-spacing="4">
      <tspan fill="none" stroke="white" stroke-width="1.5">HERMIT</tspan><tspan fill="white">SHELL</tspan>
    </text>
    <text y="22" text-anchor="middle" font-family="Courier New, monospace" font-size="10" font-weight="bold" fill="#666666" letter-spacing="10">AI_AGENT_OS</text>
  </g>
</svg>