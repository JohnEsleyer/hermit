<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hermit Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.1/umd/lucide.min.js">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
    <div class="container mx-auto px-4 py-8">
        <h1 class="text-3xl font-bold text-white mb-2">Hermit Dashboard</h1>
        <p class="text-slate-400 mb-8">Agent Test Environment</p>
        
        <button onclick="openAgentLogsModal()" class="bg-purple-600 hover:bg-purple-500 text-white px-4 py-2 rounded-lg font-bold">
            Open Agent Simulator
        </button>
    </div>

    <div id="agent-logs-modal" class="fixed inset-0 bg-black/80 backdrop-blur-sm z-50 hidden items-center justify-center p-4">
        <div class="bg-slate-900 border border-slate-700 w-full max-w-5xl h-[85vh] rounded-2xl shadow-2xl overflow-hidden flex flex-col">
            <div class="p-4 border-b border-slate-700/80 bg-slate-900/70 flex items-center justify-between">
                <div>
                    <h3 id="agent-logs-title" class="text-lg font-bold text-white">Agent Simulator (0 LLM Credits)</h3>
                    <p class="text-xs text-slate-400">Test parser extraction & side-effects safely.</p>
                </div>
                <button onclick="closeAgentLogsModal()" class="text-slate-400 hover:text-white"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            
            <div class="flex-1 grid grid-cols-1 lg:grid-cols-2 min-h-0">
                <div id="agent-logs-content" class="overflow-y-auto p-4 space-y-3 text-sm border-b lg:border-b-0 lg:border-r border-slate-700"></div>
                
                <div class="p-4 space-y-3 overflow-y-auto">
                    <div>
                        <label class="block text-xs text-purple-300 mb-1">Simulate AI Response (New XML Contract)</label>
                        <textarea id="agent-xml-test-input" class="w-full h-[55vh] bg-slate-800 border border-purple-700/70 rounded-lg p-3 text-xs text-purple-100 font-mono" spellcheck="false">
<thought>Plan to generate data and deliver the report</thought>

<message>Sending the parsed CSV report now.</message>

<terminal>
cd /app/workspace/work
python3 generate.py > /app/workspace/out/report.csv
</terminal>

<action type="GIVE">report.csv</action>
<action type="APP">my-dashboard</action>

<calendar>
  <datetime>2026-03-10T08:00:00Z</datetime>
  <prompt>Follow up on the report</prompt>
</calendar>
</textarea>
                    </div>
                    <button onclick="runXmlContractTest()" class="bg-purple-600 hover:bg-purple-500 text-white px-3 py-2 rounded-lg text-sm font-bold w-full">Run Simulation</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function openAgentLogsModal() {
            document.getElementById('agent-logs-modal').classList.remove('hidden');
            document.getElementById('agent-logs-modal').classList.add('flex');
        }

        function closeAgentLogsModal() {
            document.getElementById('agent-logs-modal').classList.add('hidden');
            document.getElementById('agent-logs-modal').classList.remove('flex');
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showToast(message) {
            alert(message);
        }

        async function runXmlContractTest() {
            const payload = document.getElementById('agent-xml-test-input').value;
            if (!payload?.trim()) return showToast('XML payload is required.');
            
            const out = document.getElementById('agent-logs-content');
            out.insertAdjacentHTML('afterbegin', '<div class="text-slate-300 text-xs">Running simulation...</div>');
            
            try {
                const res = await fetch(`/api/agent-tests/xml-contract`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: "0", payload })
                });
                const data = await res.json();
                
                if (data.error) {
                    out.insertAdjacentHTML('afterbegin', `<div class="text-red-400 text-xs">Simulation failed: ${escapeHtml(data.error)}</div>`);
                    return;
                }

                const parsed = data?.parsed || {};
                const effects = (data?.actionEffects || []).map((e) => `<li class="mb-1">${escapeHtml(String(e))}</li>`).join('');
                
                const inserted = `<div class="bg-slate-800/70 border border-green-600/50 rounded-lg p-3 space-y-2 agent-log-insert">
                    <div class="flex justify-between text-xs text-slate-400"><span>Parsed Safely by Go Regex</span><span>Success</span></div>
                    <pre class="text-[11px] text-green-300 whitespace-pre-wrap bg-black/40 p-2 rounded border border-slate-700">${escapeHtml(JSON.stringify(parsed, null, 2))}</pre>
                    <div class="mt-2"><span class="text-slate-400 text-xs font-bold uppercase tracking-wider">Simulated Effects:</span><ul class="list-disc ml-5 text-slate-200 text-xs mt-1">${effects}</ul></div>
                </div>`;
                
                out.insertAdjacentHTML('afterbegin', inserted);
            } catch (err) {
                out.insertAdjacentHTML('afterbegin', `<div class="text-red-400 text-xs">Network error: ${escapeHtml(err.message)}</div>`);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeAgentLogsModal();
        });
    </script>
</body>
</html>
